<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-visual"
		/>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#0d0f1e" />
		<meta name="mobile-web-app-capable" content="yes" />

		<!-- iOS Safari PWA -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="ChattingKuy" />
		<link rel="apple-touch-icon" href="/icon-512.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
		<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

		%sveltekit.head%
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100dvh;
				overflow: hidden;
			}
		</style>
		<script>
			// iOS Safari: cegah scroll saat tap input
			document.addEventListener(
				'touchmove',
				function (e) {
					if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') {
						e.preventDefault();
					}
				},
				{ passive: false }
			);
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
