<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#0d0f1e" />
		<meta name="mobile-web-app-capable" content="yes" />

		<!-- iOS Safari PWA -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="ChattingKuy" />
		<link rel="apple-touch-icon" href="/icon-512.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
		<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

		%sveltekit.head%
		<style>
			html,
			body {
				height: 100%;
				margin: 0;
				overscroll-behavior: none;
				overflow: hidden;
			}
			#chat-viewport {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				transition: bottom 0.05s ease-out;
			}
		</style>
		<script>
			// Ikuti visualViewport agar layout menyesuaikan keyboard iOS
			function setupViewport() {
				var vv = window.visualViewport;
				if (!vv) return;
				function update() {
					var el = document.getElementById('chat-viewport');
					if (!el) return;
					var offsetBottom = window.innerHeight - vv.height - vv.offsetTop;
					el.style.bottom = Math.max(0, offsetBottom) + 'px';
					el.style.top = vv.offsetTop + 'px';
				}
				vv.addEventListener('resize', update);
				vv.addEventListener('scroll', update);
			}
			window.addEventListener('load', setupViewport);
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="chat-viewport">%sveltekit.body%</div>
	</body>
</html>
